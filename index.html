<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roast Me — Kalau Berani</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0d;
        --card: #1a1a1a;
        --red: #ff3d3d;
        --red-dark: #cc2e2e;
        --white: #f5f5f5;
        --gray: #888;
        --border: #2a2a2a;
      }

      body {
        background: var(--bg);
        color: var(--white);
        font-family: "Space Grotesk", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      .container {
        max-width: 620px;
        margin: 0 auto;
        padding: 0 20px;
        position: relative;
        z-index: 1;
      }

      header {
        padding: 64px 0 40px;
        text-align: center;
      }

      .badge {
        display: inline-block;
        background: var(--red);
        color: #fff;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        padding: 5px 14px;
        border-radius: 2px;
        margin-bottom: 22px;
      }

      h1 {
        font-size: clamp(2.6rem, 8vw, 4.2rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -2px;
      }

      h1 em {
        font-style: normal;
        color: var(--red);
      }

      .subtitle {
        margin-top: 14px;
        color: var(--gray);
        font-size: 15px;
        line-height: 1.65;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 20px;
      }

      #skeleton {
        display: block;
      }

      .sk {
        background: linear-gradient(90deg, #1e1e1e 25%, #262626 50%, #1e1e1e 75%);
        background-size: 200% 100%;
        animation: shimmer 1.3s infinite;
        border-radius: 6px;
      }

      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }

        100% {
          background-position: -200% 0;
        }
      }

      .sk-line {
        height: 14px;
        margin-bottom: 10px;
      }

      .sk-box {
        height: 46px;
        margin-bottom: 8px;
        border-radius: 8px;
      }

      #formCard {
        display: none;
      }

      label.field-label {
        display: block;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gray);
        margin-bottom: 10px;
      }

      input.text-input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--white);
        font-family: "Space Grotesk", sans-serif;
        font-size: 17px;
        font-weight: 600;
        padding: 14px 18px;
        outline: none;
        transition: border-color 0.2s;
      }

      input.text-input::placeholder {
        color: #3a3a3a;
      }

      input.text-input:focus {
        border-color: var(--red);
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 28px 0;
      }

      /* LEVEL ROAST */
      .roast-level-section {
        margin-top: 6px;
      }

      .roast-level-title {
        display: block;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--gray);
        margin-bottom: 12px;
      }

      .roast-level-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .roast-level-card {
        position: relative;
        display: block;
        cursor: pointer;
      }

      .roast-level-card input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .level-box {
        display: block;
        padding: 14px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--bg);
        transition: border-color 0.15s, background 0.15s, transform 0.15s;
      }

      .level-box span {
        display: block;
        color: var(--white);
        font-size: 14px;
        font-weight: 800;
      }

      .level-box small {
        display: block;
        margin-top: 4px;
        color: var(--gray);
        font-size: 11px;
        line-height: 1.4;
      }

      .roast-level-card:hover .level-box {
        border-color: #444;
        transform: translateY(-1px);
      }

      .roast-level-card input:checked + .level-box {
        border-color: var(--red);
        background: rgba(255, 61, 61, 0.12);
        box-shadow: 0 0 0 1px rgba(255, 61, 61, 0.22);
      }

      .roast-level-card input:checked + .level-box span {
        color: #fff;
      }

      .roast-level-card input:checked + .level-box small {
        color: #ff9b9b;
      }

      #questionsSection {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .q-label {
        font-family: "Space Mono", monospace;
        font-size: 11px;
        color: var(--red);
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      .q-text {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.45;
        margin-bottom: 12px;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .opt-btn {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--gray);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 500;
        padding: 12px 16px;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
      }

      .opt-btn:hover {
        border-color: #444;
        color: var(--white);
      }

      .opt-btn.selected {
        background: rgba(255, 61, 61, 0.1);
        border-color: var(--red);
        color: var(--white);
      }

      .btn-primary {
        width: 100%;
        background: var(--red);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 15px;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        letter-spacing: 0.3px;
      }

      .btn-primary:hover {
        background: var(--red-dark);
      }

      .btn-primary:active {
        transform: scale(0.98);
      }

      .btn-primary:disabled {
        background: #2a2a2a;
        color: #555;
        cursor: not-allowed;
      }

      .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }

      .btn-outline {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--white);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 600;
        padding: 12px;
        cursor: pointer;
        transition: border-color 0.15s;
      }

      .btn-outline:hover {
        border-color: #555;
      }

      .btn-red-outline {
        flex: 1;
        background: transparent;
        border: 1px solid var(--red);
        border-radius: 10px;
        color: var(--red);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 600;
        padding: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-red-outline:hover {
        background: rgba(255, 61, 61, 0.08);
      }

      .error-box {
        display: none;
        background: rgba(255, 61, 61, 0.07);
        border: 1px solid rgba(255, 61, 61, 0.25);
        border-radius: 8px;
        color: #ff8080;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        padding: 13px 16px;
        margin-top: 14px;
      }

      .error-box.show {
        display: block;
      }

      #loadingCard {
        display: none;
        text-align: center;
        padding: 48px 32px;
      }

      #loadingCard.show {
        display: block;
      }

      .spinner {
        width: 34px;
        height: 34px;
        border: 3px solid var(--border);
        border-top-color: var(--red);
        border-radius: 50%;
        margin: 0 auto 16px;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-txt {
        font-family: "Space Mono", monospace;
        font-size: 12px;
        color: var(--gray);
      }

      #resultCard {
        display: none;
      }

      #resultCard.show {
        display: block;
      }

      .result-head {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 22px;
      }

      .result-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--red);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }

      .result-name {
        font-weight: 700;
        font-size: 17px;
      }

      .result-tag {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--red);
        margin-top: 2px;
      }

      .roast-text {
        font-family: "Space Mono", monospace;
        font-size: 14px;
        line-height: 1.85;
        color: #d8d8d8;
        white-space: pre-wrap;
        min-height: 60px;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 15px;
        background: var(--red);
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0;
        }
      }

      #toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(70px);
        background: var(--white);
        color: #111;
        font-family: "Space Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        padding: 11px 22px;
        border-radius: 8px;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 999;
        white-space: nowrap;
        pointer-events: none;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
      }

      footer {
        text-align: center;
        padding: 36px 0 56px;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        color: #2e2e2e;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        .roast-level-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 480px) {
        .card {
          padding: 24px 18px;
        }

        h1 {
          letter-spacing: -1px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="badge">AI Roast Generator</div>
        <h1>Mau di-<em>Roast</em>?</h1>
        <p class="subtitle">
          Jawab 5 pertanyaan absurd.<br />
          AI bakal roast kamu. Kalau berani.
        </p>
      </header>

      <div class="card" id="skeleton">
        <div class="sk sk-line" style="width: 35%; margin-bottom: 16px;"></div>
        <div class="sk sk-box" style="margin-bottom: 24px;"></div>
        <div class="sk sk-line" style="width: 60%; margin-bottom: 12px;"></div>
        <div class="sk sk-box"></div>
        <div class="sk sk-box"></div>
        <div class="sk sk-box"></div>
        <div class="sk sk-box"></div>
      </div>

      <div class="card" id="formCard">
        <div style="margin-bottom: 28px;">
          <label class="field-label" for="nameInput">Nama kamu</label>
          <input
            type="text"
            id="nameInput"
            class="text-input"
            placeholder="Tulis nama kamu..."
            maxlength="30"
            autocomplete="off"
          />
        </div>

        <div class="roast-level-section">
          <label class="roast-level-title">Level kekasaran AI</label>

          <div class="roast-level-grid">
            <label class="roast-level-card">
              <input type="radio" name="roastLevel" value="aman" />
              <span class="level-box">
                <span>Aman</span>
                <small>Nyindir halus, tanpa kata kasar</small>
              </span>
            </label>

            <label class="roast-level-card">
              <input type="radio" name="roastLevel" value="pedas" />
              <span class="level-box">
                <span>Pedas</span>
                <small>Lebih nyelekit, sedikit kasar</small>
              </span>
            </label>

            <label class="roast-level-card">
              <input type="radio" name="roastLevel" value="kasar" checked />
              <span class="level-box">
                <span>Kasar</span>
                <small>Goblok, dongo, tolol, bego</small>
              </span>
            </label>

            <label class="roast-level-card">
              <input type="radio" name="roastLevel" value="brutal" />
              <span class="level-box">
                <span>Brutal</span>
                <small>No sensor kata kasar umum</small>
              </span>
            </label>
          </div>
        </div>

        <hr class="divider" />

        <div id="questionsSection"></div>

        <hr class="divider" />

        <button class="btn-primary" id="submitBtn" onclick="submitRoast()">
          Roast Gue
        </button>

        <div class="error-box" id="formError"></div>
      </div>

      <div class="card" id="loadingCard">
        <div class="spinner"></div>
        <p class="loading-txt">AI lagi mikirin roast terbaik buat kamu...</p>
      </div>

      <div class="card" id="resultCard">
        <div class="result-head">
          <div class="result-avatar" id="resultEmoji">🔥</div>
          <div>
            <div class="result-name" id="resultName"></div>
            <div class="result-tag" id="resultTag">Sudah Diroast</div>
          </div>
        </div>

        <hr class="divider" style="margin: 0 0 20px;" />

        <div class="roast-text" id="roastOutput"></div>

        <div class="btn-row">
          <button class="btn-outline" onclick="tryAgain()">Coba Lagi</button>
          <button class="btn-red-outline" onclick="copyResult()">Salin & Share</button>
        </div>
      </div>

      <footer>Roast Me — No Filter, No Mercy</footer>
    </div>

    <div id="toast"></div>

<script>
  let questions = [];
  let selected = {};
  let currentRoastLevel = "kasar";

  const EMOJIS = ["🔥", "💀", "😂", "👀", "🤡", "😭", "⚡", "🤦"];
  const MEMORY_KEY = "roastMeAgentMemoryV1";

  window.addEventListener("DOMContentLoaded", () => {
    loadQuestions();
  });

  function getAgentMemory() {
    try {
      return JSON.parse(localStorage.getItem(MEMORY_KEY) || "{}");
    } catch {
      return {};
    }
  }

  function saveAgentMemory(preferenceUpdate) {
    if (!preferenceUpdate || typeof preferenceUpdate !== "object") return;

    localStorage.setItem(MEMORY_KEY, JSON.stringify(preferenceUpdate));
  }

  async function loadQuestions() {
    showSkeleton();

    try {
      const cacheBuster = `${Date.now()}-${Math.random().toString(36).slice(2)}`;

      const res = await fetch(`/api/generate-questions?refresh=${cacheBuster}`, {
        method: "GET",
        cache: "no-store",
        headers: {
          "Cache-Control": "no-cache",
        },
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

      if (!Array.isArray(data.questions) || data.questions.length === 0) {
        throw new Error("Format soal tidak valid.");
      }

      questions = data.questions;
      selected = {};

      renderQuestions();
      showForm();
    } catch (err) {
      showSkeletonError(err.message);
    }
  }

  function renderQuestions() {
    const container = document.getElementById("questionsSection");
    container.innerHTML = "";

    questions.forEach((q, qi) => {
      const block = document.createElement("div");

      const optionsHTML = q.options
        .map(
          (opt, oi) =>
            `<button class="opt-btn" onclick="pick(${qi}, ${oi}, this)">${escapeHTML(opt)}</button>`
        )
        .join("");

      block.innerHTML = `
        <div class="q-label">0${qi + 1}</div>
        <div class="q-text">${escapeHTML(q.text)}</div>
        <div class="options" id="opts-${qi}">${optionsHTML}</div>
      `;

      container.appendChild(block);
    });
  }

  function pick(qi, oi, el) {
    document
      .querySelectorAll(`#opts-${qi} .opt-btn`)
      .forEach((button) => button.classList.remove("selected"));

    el.classList.add("selected");

    selected[qi] = {
      question: questions[qi].text,
      answer: questions[qi].options[oi],
    };
  }

  async function submitRoast() {
    const name = document.getElementById("nameInput").value.trim();

    const roastLevel =
      document.querySelector('input[name="roastLevel"]:checked')?.value || "kasar";

    currentRoastLevel = roastLevel;

    const userPreference = getAgentMemory();

    hideError();

    if (!name) {
      return showError("Isi nama kamu dulu.");
    }

    if (Object.keys(selected).length < questions.length) {
      return showError("Jawab semua pertanyaan dulu — satu pun nggak boleh dilewat.");
    }

    showLoading();

    try {
      const res = await fetch("/api/roast", {
        method: "POST",
        cache: "no-store",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name,
          answers: Object.values(selected),
          roastLevel,
          userPreference,
        }),
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      if (!data.roast) throw new Error("Respons roast kosong.");

      if (data.preferenceUpdate) {
        saveAgentMemory(data.preferenceUpdate);
      }

      showResult(name, data.roast, data.level || roastLevel, data.persona, data.selfCheck);
    } catch (err) {
      showForm();
      showError(`Gagal: ${err.message}`);
    }
  }

  function showResult(name, text, level, persona, selfCheck) {
    document.getElementById("resultName").textContent = name;

    const resultTag =
      document.getElementById("resultTag") || document.querySelector(".result-tag");

    if (resultTag) {
      const personaLabel = persona?.title || persona?.type || "Agentic Roast";
      resultTag.textContent = `Sudah Diroast • ${String(level || "kasar").toUpperCase()} • ${personaLabel}`;
    }

    document.getElementById("resultEmoji").textContent =
      EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

    document.getElementById("loadingCard").classList.remove("show");
    document.getElementById("resultCard").classList.add("show");

    typewriter(text);
  }

  function typewriter(text) {
    const el = document.getElementById("roastOutput");
    const cursor = document.createElement("span");

    cursor.className = "cursor";
    el.innerHTML = "";
    el.appendChild(cursor);

    let i = 0;

    function type() {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i += 1;
        setTimeout(type, 17);
      } else {
        setTimeout(() => cursor.remove(), 1500);
      }
    }

    type();
  }

  async function tryAgain() {
    document.getElementById("resultCard").classList.remove("show");
    document.getElementById("nameInput").value = "";

    await loadQuestions();

    const checked = document.querySelector(
      `input[name="roastLevel"][value="${currentRoastLevel}"]`
    );

    if (checked) checked.checked = true;

    window.scrollTo({
      top: 0,
      behavior: "smooth",
    });
  }

  function copyResult() {
    const name = document.getElementById("resultName").textContent;
    const roast = document.getElementById("roastOutput").textContent;

    const resultTag =
      document.getElementById("resultTag") || document.querySelector(".result-tag");

    const tag = resultTag ? resultTag.textContent : "Sudah Diroast";

    navigator.clipboard
      .writeText(`🔥 AI Roast untuk ${name}\n${tag}\n\n${roast}`)
      .then(() => toast("Disalin! Siap dishare 🔥"));
  }

  function showSkeleton() {
    const skeleton = document.getElementById("skeleton");

    skeleton.innerHTML = `
      <div class="sk sk-line" style="width: 35%; margin-bottom: 16px;"></div>
      <div class="sk sk-box" style="margin-bottom: 24px;"></div>
      <div class="sk sk-line" style="width: 60%; margin-bottom: 12px;"></div>
      <div class="sk sk-box"></div>
      <div class="sk sk-box"></div>
      <div class="sk sk-box"></div>
      <div class="sk sk-box"></div>
    `;

    skeleton.style.display = "block";
    document.getElementById("formCard").style.display = "none";
    document.getElementById("loadingCard").classList.remove("show");
    document.getElementById("resultCard").classList.remove("show");
  }

  function showForm() {
    document.getElementById("skeleton").style.display = "none";
    document.getElementById("formCard").style.display = "block";
    document.getElementById("loadingCard").classList.remove("show");
    document.getElementById("resultCard").classList.remove("show");
  }

  function showLoading() {
    document.getElementById("formCard").style.display = "none";
    document.getElementById("loadingCard").classList.add("show");
    document.getElementById("resultCard").classList.remove("show");
  }

  function showSkeletonError(msg) {
    document.getElementById("skeleton").innerHTML = `
      <p style="font-family:'Space Mono',monospace;font-size:12px;color:#ff8080;margin-bottom:14px;">
        Gagal memuat soal: ${escapeHTML(msg)}
      </p>
      <button class="btn-primary" onclick="loadQuestions()" style="width:auto;padding:10px 24px;">
        Coba Lagi
      </button>
    `;
  }

  function showError(msg) {
    const el = document.getElementById("formError");
    el.textContent = msg;
    el.classList.add("show");
  }

  function hideError() {
    document.getElementById("formError").classList.remove("show");
  }

  function toast(msg) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");

    setTimeout(() => {
      el.classList.remove("show");
    }, 2600);
  }

  function escapeHTML(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
